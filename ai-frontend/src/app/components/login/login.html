<div class="login-container">

  <div class="login-card">

    <h1>AI Task Tracker</h1>

    <form (ngSubmit)="login()">
      <input
        type="text"
        placeholder="Username"
        [(ngModel)]="loginData.username"
        name="username"
        required
      />
      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="loginData.password"
        name="password"
        required
      />

      <button type="submit">
        Login
      </button> </form>

  </div>

</div>
